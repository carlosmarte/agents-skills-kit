- id: agent-skills-validate
  name: skills-ref validate
  description: Validate SKILL.md files against agentskills.io spec
  entry: npx --prefix .agents/skills/agent-skill-kit-commons/packages/mjs skills-ref validate
  language: system
  files: ^\.agents/skills/.*/SKILL\.md$
  pass_filenames: false
  args: [".agents/skills/", "--extra-tiers", "company,enterprise,application"]

- id: agent-skills-lint
  name: skills-ref lint
  description: Score SKILL.md descriptions for discoverability
  entry: npx --prefix .agents/skills/agent-skill-kit-commons/packages/mjs skills-ref lint
  language: system
  files: ^\.agents/skills/.*/SKILL\.md$
  pass_filenames: false
  args: [".agents/skills/"]

- id: agent-skills-audit
  name: skills-ref audit
  description: Security audit of skills tree
  entry: npx --prefix .agents/skills/agent-skill-kit-commons/packages/mjs skills-ref audit
  language: system
  files: ^\.agents/skills/.*$
  pass_filenames: false
  args: [".agents/skills/"]

- id: agent-skills-deps
  name: skills-ref deps
  description: Check skill dependency graph for cycles, inversions, conflicts
  entry: npx --prefix .agents/skills/agent-skill-kit-commons/packages/mjs skills-ref deps
  language: system
  files: ^\.agents/skills/.*/SKILL\.md$
  pass_filenames: false
  args: [".agents/skills/", "--extra-tiers", "company,enterprise,application"]
